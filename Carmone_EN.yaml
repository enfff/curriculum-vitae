  page_numbering_template: I authorise the processing of the personal data contained in my CV, pursuant to GDPR (EU) 2016/679, Article 6.1(a).
  # page_numbering_template: NAME - Page PAGE_NUMBER of TOTAL_PAGES
  last_updated_date_template: Last updated in TODAY
  date_template: MONTH_ABBREVIATION YEAR
  month: month
  months: months
  year: year
  years: years
  present: now
  to: –
  abbreviations_for_months:
